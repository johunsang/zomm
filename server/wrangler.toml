# Cloudflare Workers 배포 — Worker 하나가 프론트(정적) + /api(토큰 발급)를 서빙.
#
# 배포 순서:
#   1) cd server
#   2) pnpm dlx wrangler login                      # Cloudflare 계정 로그인(브라우저)
#   3) 키를 시크릿으로 등록 (코드/공개변수 아님):
#        pnpm dlx wrangler secret put CF_ACCOUNT_ID
#        pnpm dlx wrangler secret put CF_REALTIMEKIT_APP_ID
#        pnpm dlx wrangler secret put CF_API_TOKEN
#   4) 프론트 빌드:  pnpm --filter @zomm/web build   # → web/dist
#   5) 배포:        pnpm dlx wrangler deploy          # → https://zomm.<서브도메인>.workers.dev

name = "zomm"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# 프론트엔드 정적 자산(Vite 빌드 결과). 없는 경로는 SPA 폴백(index.html).
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# preset 이름을 대시보드와 다르게 쓴다면 여기서 덮어쓸 수 있다(시크릿 아님, 공개 변수).
[vars]
RTK_HOST_PRESET = "webinar_presenter"        # 강사: 발표(카메라·마이크·화면공유·녹화)
RTK_PARTICIPANT_PRESET = "webinar_viewer"    # 수강생: 채팅만(무대 밖 뷰어)
MAX_PARTICIPANTS = "0"  # 0 = 무제한
